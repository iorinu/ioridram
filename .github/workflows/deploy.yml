name: Deploy to Rental Server

on:
  push:
    branches:
      - main # mainブランチにプッシュされた時だけ動く

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを取得
      - name: Get latest code
        uses: actions/checkout@v4

      # 2. Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Astroが動くバージョン

      # 3. 依存ライブラリのインストール
      - name: Install dependencies
        run: npm ci

      # 4. Astroのビルド (distフォルダが生成される)
      - name: Build Astro
        run: npm run build

      # 5. レンタルサーバーへ転送
      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # ローカルのどのフォルダをアップロードするか
          local-dir: ./Astro/astro-ioridram/dist/

          # サーバーのどこに置くか
          server-dir: ./ioridram/

          # 転送時に全削除してからアップロードするか（クリーンインストール的な）
          # trueにすると、server-dirの中身を一旦空にします。最初はfalseで試すのが安全です。
          dangerous-clean-slate: false
