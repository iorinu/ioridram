<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="16" fill="#0a0a0a"/>
  <!-- Outer glow -->
  <text x="64" y="96" font-family="monospace" font-weight="bold" font-size="90" text-anchor="middle" fill="#ff003c" opacity="0.3" filter="url(#outer-glow)">I</text>
  <!-- Main neon text -->
  <text x="64" y="96" font-family="monospace" font-weight="bold" font-size="90" text-anchor="middle" fill="#ff003c" filter="url(#neon-glow)">I</text>
  <!-- Bright center stroke -->
  <text x="64" y="96" font-family="monospace" font-weight="bold" font-size="90" text-anchor="middle" fill="none" stroke="#ff8a9e" stroke-width="1.5">I</text>
</svg>
